server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint - served from file generated at container startup
    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store";
        try_files $uri =503;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for fingerprinted Blazor framework files
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for appsettings.json (injected at startup)
    location = /appsettings.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # gzip compression
    gzip on;
    gzip_types
        application/javascript
        application/json
        application/wasm
        text/css
        text/plain;
    gzip_min_length 256;
}
